<script>

//state

let isFahrenheit = true;

let apiTemperature = 0;

//dom

const body = document.body;

const btn = document.querySelector("button");

const main2 = body.lastElementChild.previousElementSibling;

const main1 = main2.previousElementSibling;



const span1 = document.querySelector(".span1");

const span2 = document.querySelector(".span2");



const country = document.querySelector(".country");

const time = document.querySelector(".time");

const warning1 = document.querySelector(".warning1");

const warning2 = document.querySelector(".warning");



const temperature = document.querySelector(".temp");

const humidity = document.querySelector(".hum");

const wind = document.querySelector(".wind");



const temp1 = document.querySelector(".temp1");

const temp2 = document.querySelector(".temp2");

const temp3 = document.querySelector(".temp3");

const temp4 = document.querySelector(".temp4");

const temp5 = document.querySelector(".temp5");

const temp6 = document.querySelector(".temp6");

const temp7 = document.querySelector(".temp7");



const wind1 = document.querySelector(".win1");

const wind2 = document.querySelector(".win2");

const wind3 = document.querySelector(".win3");

const wind4 = document.querySelector(".win4");

const wind5 = document.querySelector(".win5");

const wind6 = document.querySelector(".win6");

const wind7 = document.querySelector(".win7");



const icon = document.querySelector(".icon");



const h1 = document.querySelector("h1");

const h2 = document.querySelector("h2");



const p1 = document.getElementById("day1");

const p2 = document.getElementById("day2");

const p3 = document.getElementById("day3");



const p4 = document.getElementById("day4");

const p5 = document.getElementById("day5");

const p6 = document.getElementById("day6");

const p7 = document.getElementById("day7");

const i2 = document.getElementsByClassName("day2");

const i3 = document.getElementsByClassName("day3");



const i4 = document.getElementsByClassName("day4");

const i5 = document.getElementsByClassName("day5");

const i6 = document.getElementsByClassName("day6");

const i7 = document.getElementsByClassName("day7");



const forecastCards = document.querySelectorAll("#second-main > div");

const temps = document.querySelectorAll("[class^='temp']");

const winds = document.querySelectorAll("[class^='win']");

const imgs = document.querySelectorAll("[class^='day']");

const times = document.querySelectorAll("[id^='day']");

const days = document.querySelectorAll("[class='names']");



const input = document.getElementById("inp");

const searchBtn = document.getElementById("search");



console.log(temps);

console.log(winds);

console.log(days);

console.log(forecastCards);



function clearUI() {

country.textContent = "";

time.textContent = "";

warning1.textContent = "";

warning2.textContent = "";

span1.textContent = "";

h2.textContent = "";

temperature.textContent = "";

humidity.textContent = "";

wind.textContent = "";

}

function requestApi() {
  const targetLocation = input.value.trim().toLowerCase() || "london";
  const API_KEY = "A7JSY3YUHWE7S454SNKKJRNLK";
  const url = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${targetLocation}/?key=${API_KEY}`;

  return fetch(url)
    .then((response) =>
      !response.ok
        ? Promise.reject(new Error(`http Error: ${response.status}`))
        : response.json()
    )
    .then((data) => {
      console.log(data);
      return data;
    });
}





searchBtn.addEventListener("click", (e) => {

e.preventDefault();

processJsonData();

});



async function processJsonData() {

clearUI();





const response = await requestApi();

country.textContent = response.address;

time.textContent = new Date().toLocaleTimeString("en-US", {

timeZone: response.timezone,

});



if (response.alerts && response.alerts.length > 0) {

warning1.textContent = "Warning:";

warning2.textContent = response.alerts[0].headline;

} else {

warning1.textContent = "";

warning2.textContent = "";

}

temperature.textContent = "temp: " + response.days[0].temp + " F";

humidity.textContent =

"humidity: " + response.days[0].humidity + " %";

wind.textContent = "wind: " + response.days[0].windspeed + " mph";

apiTemperature = response.days[0].temp;

renderTemperature();

h2.textContent = response.days[0].conditions;

displayWeatherIcon(response.days[0].icon);



for (i = 0; i < response.days.length; i++) {

let forecast = response.days[i];

days[i].textContent = new Date(forecast.datetime).toLocaleDateString(

"en-US",

{ weekday: "long" },

);

temps[i].textContent = ` temp: ${forecast.temp}`;

winds[i].textContent = ` Wind speed: ${forecast.windspeed}`;

times[i].textContent = `${forecast.datetime}`;

imgs[i].src = `assets/icons/${forecast.icon}.png`;


}

} 




function getCelcius(F) {

return (5 / 9) * (F - 32);

}



async function displayWeatherIcon(TodaysDescription) {

icon.src = await `assets/icons/${TodaysDescription}.png`;

}

renderTemperature = () => {

if (isFahrenheit) {

span1.textContent = apiTemperature;

span2.textContent = "F";

} else {

span1.textContent = getCelcius(apiTemperature).toFixed(1);

span2.textContent = "C";

}

};



btn.addEventListener("click", (e) => {

e.preventDefault();

isFahrenheit = !isFahrenheit;

renderTemperature();

});



processJsonData();

</script>
